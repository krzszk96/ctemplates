<section class="products">
  <div class="products__header">
    <h1 class="products__title">Wedding Templates</h1>
    <p class="products__subtitle">Beautiful Canva templates for your special day</p>
  </div>

  <app-product-filters
    [categories]="categories()"
    [activeCategory]="activeCategory()"
    (categoryChange)="setCategory($event)"
  />

  @let items = filteredProducts();

  <div class="products__grid">
    @for (product of items; track product.id) {
      <app-product-card [product]="product" />
    } @empty {
      <p class="products__empty">No templates found in this category.</p>
    }
  </div>
</section>
