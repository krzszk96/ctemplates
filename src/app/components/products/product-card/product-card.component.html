@let _product = product();

<article class="product-card" [class.product-card--in-cart]="inCart()" (click)="goToDetail()" role="button" tabindex="0" (keydown.enter)="goToDetail()">
  <div class="product-card__image-wrapper">
    <img class="product-card__image" [src]="_product.previewUrl" [alt]="_product.title" loading="lazy" />
    @if (_product.badge) {
      <app-product-badge [type]="_product.badge" />
    }
    @if (inCart()) {
      <div class="product-card__in-cart">✓ In cart</div>
    }
  </div>

  <div class="product-card__body">
    <span class="product-card__category">{{ _product.category }}</span>
    <h3 class="product-card__title">{{ _product.title }}</h3>

    <div class="product-card__footer">
      <span class="product-card__price">${{ _product.price }}</span>
      <button class="product-card__btn" (click)="$event.stopPropagation(); goToDetail()">
        Get template
      </button>
    </div>
  </div>
</article>
